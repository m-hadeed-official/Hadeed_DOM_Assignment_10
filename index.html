<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM_10</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="app">
      <h2 class="list-heading">Todo List</h2>
      <div class="inp-btn-container">
        <input type="text" id="taskInput" />
        <div class="btn-container">
          <button id="addBtn">Add Task</button>
          <button id="clearBtn">clear Items</button>
        </div>
      </div>
      <ul id="listContainer" class="list-container"></ul>

      <p class="task-count-container">
        No of Tasks : <span id="taskCounter"></span>
      </p>
    </div>
  </body>
</html>
